name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Pack & Publish to NuGet
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --filter "Category!=Container"

      - name: Container Tests
        run: >
          dotnet test
          tests/SensitiveFlow.Audit.EFCore.ContainerTests/SensitiveFlow.Audit.EFCore.ContainerTests.csproj
          --configuration Release
          --no-build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Pack
        run: >
          dotnet pack
          --configuration Release
          --no-build
          -p:PackageVersion=${{ steps.version.outputs.VERSION }}
          --output ./nupkgs

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push ./nupkgs/*.nupkg
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbols to NuGet
        run: >
          dotnet nuget push ./nupkgs/*.snupkg
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
